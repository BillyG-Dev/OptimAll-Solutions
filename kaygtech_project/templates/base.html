<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}KayGTech Solutions{% endblock %}</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --text-color: #333;
            --light-bg: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            color: var(--text-color);
            background-color: var(--light-bg);
        }

        header {
            background: var(--primary-color);
            color: #fff;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            margin-left: 20px;
            font-weight: 500;
        }

        main { flex: 1; }

        .cta-section {
            background: var(--secondary-color);
            color: white;
            text-align: center;
            padding: 80px 5%;
        }

        .btn {
            background: #fff;
            color: var(--secondary-color);
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            display: inline-block;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: #222;
            color: #ccc;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo"><strong>OptmAll</strong> Solutions</div>
        <nav>
            <a href="home.html">Home</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 OptmAll Solutions | Nairobi, Kenya</p>
    </footer>

</body>
</html>
